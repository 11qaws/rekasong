name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Test
        run: npm test
      - name: Lint
        run: npm run lint
      - name: Check Worker syntax
        run: node --check workers/rekasong-session/src/index.js
      - name: Build
        run: npm run build
      - name: Production Dashboard UX and performance budget
        run: node scripts/dashboard-production-smoke.mjs --local
      - name: Pseudo-locale layout
        run: npm run test:dashboard:pseudo
      - name: Local file lifetime budget
        run: npm run test:dashboard:blob-budget
      - name: Check OBS bundle
        run: npm run check:obs:bundle
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
